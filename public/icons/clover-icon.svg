<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <path id="cloverPath" d="
      M100 33.7 A31.3 31.3 0 0 1 131.3 65 A31.3 31.3 0 0 1 135 68.7
      A31.3 31.3 0 0 1 166.3 100 A31.3 31.3 0 0 1 135 131.3
      A31.3 31.3 0 0 1 131.3 135 A31.3 31.3 0 0 1 100 166.3
      A31.3 31.3 0 0 1 68.7 135 A31.3 31.3 0 0 1 65 131.3
      A31.3 31.3 0 0 1 33.7 100 A31.3 31.3 0 0 1 65 68.7
      A31.3 31.3 0 0 1 68.7 65 A31.3 31.3 0 0 1 100 33.7 Z"/>
    <clipPath id="clover"><use href="#cloverPath"/></clipPath>
    <clipPath id="topLeftHalf">
      <rect x="0" y="0" width="200" height="200" transform="rotate(-45,100,100)"/>
    </clipPath>
    <clipPath id="bottomRightHalf">
      <rect x="0" y="0" width="200" height="200" transform="rotate(135,100,100)"/>
    </clipPath>

    <filter id="softShadow" x="-12%" y="-6%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2a4a3a" flood-opacity="0.2"/>
    </filter>
    <filter id="discShadow" x="-25%" y="-15%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8a7a20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(256,256) scale(2.52) translate(-100,-100)" filter="url(#softShadow)">

    <!-- Petal: glass tile with subtle thickness -->
    <!-- Side/thickness (slightly offset down, slightly darker) -->
    <g transform="translate(0,1.8)">
      <use href="#cloverPath" fill="white" opacity="0.2"/>
    </g>
    <!-- Main glass face -->
    <use href="#cloverPath" fill="white" opacity="0.45"/>

    <!-- Thin edge light lines -->
    <g clip-path="url(#topLeftHalf)">
      <use href="#cloverPath" fill="none" stroke="white" stroke-width="1.2" opacity="1"/>
    </g>
    <g clip-path="url(#bottomRightHalf)">
      <use href="#cloverPath" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    </g>

    <!-- Center disc -->
    <g filter="url(#discShadow)">
      <!-- Side/thickness -->
      <circle cx="100" cy="101.5" r="26" fill="#E8D040" opacity="0.35"/>
      <!-- Main face -->
      <circle cx="100" cy="100" r="26" fill="#FBEC5D" opacity="0.85"/>
      <!-- Thin edge lines -->
      <g clip-path="url(#topLeftHalf)">
        <circle cx="100" cy="100" r="25.5" fill="none" stroke="white" stroke-width="1.2" opacity="1"/>
      </g>
      <g clip-path="url(#bottomRightHalf)">
        <circle cx="100" cy="100" r="25.5" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="0.8"/>
      </g>
    </g>
  </g>
</svg>
