<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Clover shape as clip path (unified, no overlap visible) -->
    <clipPath id="cloverClip">
      <ellipse cx="100" cy="62" rx="34" ry="34"/>
      <ellipse cx="138" cy="100" rx="34" ry="34"/>
      <ellipse cx="100" cy="138" rx="34" ry="34"/>
      <ellipse cx="62" cy="100" rx="34" ry="34"/>
      <circle cx="100" cy="100" r="20"/>
    </clipPath>
    <!-- Depth gradient (top light → bottom slightly darker) -->
    <linearGradient id="depth" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Center circle clip -->
    <clipPath id="centerClip">
      <circle cx="100" cy="100" r="28"/>
    </clipPath>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2A8A70" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(256,256) scale(2.8) translate(-100,-100)" filter="url(#shadow)">
    <!-- Unified flat clover body -->
    <rect x="20" y="20" width="160" height="160" fill="white" opacity="0.55" clip-path="url(#cloverClip)"/>
    <!-- Subtle depth overlay -->
    <rect x="20" y="20" width="160" height="160" fill="url(#depth)" clip-path="url(#cloverClip)"/>

    <!-- Center circle (solid, stands out) -->
    <circle cx="100" cy="100" r="28" fill="#FBEC5D"/>
    <!-- Center subtle highlight -->
    <ellipse cx="96" cy="94" rx="8" ry="5" fill="white" opacity="0.3"/>
  </g>
</svg>
