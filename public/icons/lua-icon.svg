<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background glow -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Pearl body gradient -->
    <radialGradient id="pearl-base" cx="38%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#ede4ff"/>
      <stop offset="20%" stop-color="#d4c8f0"/>
      <stop offset="45%" stop-color="#b0a0d8"/>
      <stop offset="70%" stop-color="#6858a8"/>
      <stop offset="100%" stop-color="#483090"/>
    </radialGradient>

    <!-- Iridescence -->
    <radialGradient id="iri-indigo" cx="62%" cy="64%" r="38%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iri-pink" cx="68%" cy="42%" r="30%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iri-teal" cx="42%" cy="72%" r="25%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim light -->
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="88%" stop-color="transparent"/>
      <stop offset="96%" stop-color="#c4b5fd" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Main sheen -->
    <radialGradient id="sheen" cx="32%" cy="28%" r="32%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Halo glow -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="68%" stop-color="#c4b5fd" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="25" flood-color="#6d28d9" flood-opacity="0.3"/>
    </filter>

    <!-- Halo blur -->
    <filter id="haloBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Highlight blur -->
    <filter id="hlBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0c0a14"/>
  <rect width="512" height="512" fill="url(#bg-glow)"/>

  <!-- Halo glow -->
  <circle cx="256" cy="256" r="240" fill="url(#halo)"/>

  <!-- Halo rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#a78bfa"
    stroke-width="12" opacity="0.04" filter="url(#haloBlur)"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#a78bfa"
    stroke-width="2.5" opacity="0.1"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#a78bfa"
    stroke-width="1.2" opacity="0.05"/>

  <!-- Pearl sphere -->
  <circle cx="256" cy="256" r="140" fill="url(#pearl-base)" filter="url(#shadow)"/>
  <!-- Iridescence -->
  <circle cx="256" cy="256" r="140" fill="url(#iri-indigo)"/>
  <circle cx="256" cy="256" r="140" fill="url(#iri-pink)"/>
  <circle cx="256" cy="256" r="140" fill="url(#iri-teal)"/>
  <!-- Rim light -->
  <circle cx="256" cy="256" r="140" fill="url(#rim)"/>
  <!-- Sheen -->
  <circle cx="256" cy="256" r="140" fill="url(#sheen)"/>
  <!-- Highlight cluster -->
  <ellipse cx="200" cy="190" rx="23" ry="18" fill="white" opacity="0.75" filter="url(#hlBlur)"/>
  <circle cx="190" cy="175" r="9" fill="white" opacity="0.9"/>
  <circle cx="180" cy="165" r="4" fill="white" opacity="0.6"/>
  <circle cx="307" cy="310" r="6" fill="white" opacity="0.1"/>

  <!-- Pearl edge highlight -->
  <circle cx="256" cy="256" r="134" fill="none" stroke="white" stroke-width="1.2" opacity="0.05"/>
</svg>
