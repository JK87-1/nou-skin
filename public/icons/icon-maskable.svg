<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1f"/>
      <stop offset="100%" stop-color="#161633"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="35%" r="30%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>
  <!-- Background fills entire area for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- Scaled down to fit within 80% safe zone (51-461) -->
  <path d="M200 158 V328 Q200 355 227 355 L326 355"
        fill="none" stroke="url(#stroke)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI accent dot -->
  <circle cx="324" cy="182" r="22" fill="url(#dotGlow)"/>
  <circle cx="319" cy="177" r="7" fill="rgba(255,255,255,0.3)"/>
</svg>
