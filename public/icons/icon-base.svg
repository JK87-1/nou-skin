<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1f"/>
      <stop offset="100%" stop-color="#161633"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="30%" r="35%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Subtle ambient glow -->
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- Bold L lettermark -->
  <path d="M185 128 V348 Q185 380 217 380 L342 380"
        fill="none" stroke="url(#stroke)" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI accent dot -->
  <circle cx="340" cy="156" r="26" fill="url(#dotGlow)"/>
  <!-- Dot inner highlight -->
  <circle cx="334" cy="150" r="8" fill="rgba(255,255,255,0.35)"/>
</svg>
