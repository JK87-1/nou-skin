<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8FFDE"/>
      <stop offset="52%" stop-color="#98FBCB"/>
      <stop offset="100%" stop-color="#78E0B0"/>
    </linearGradient>
    <linearGradient id="bgGloss" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.38"/>
      <stop offset="42%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clover">
      <ellipse cx="100" cy="62" rx="34" ry="34"/>
      <ellipse cx="138" cy="100" rx="34" ry="34"/>
      <ellipse cx="100" cy="138" rx="34" ry="34"/>
      <ellipse cx="62" cy="100" rx="34" ry="34"/>
      <circle cx="100" cy="100" r="20"/>
    </clipPath>

    <linearGradient id="glassBase" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#eaeaea"/>
    </linearGradient>
    <radialGradient id="topGloss" cx="45%" cy="15%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomShadow" x1="50%" y1="60%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="70%" stop-color="black" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="rimLight" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#f0f8f0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF8B8"/>
      <stop offset="40%" stop-color="#FBEC5D"/>
      <stop offset="100%" stop-color="#E8D040"/>
    </radialGradient>
    <linearGradient id="centerDepth" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-8%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0A2818" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bgGloss)"/>

  <g transform="translate(256,256) scale(2.2) translate(-100,-100)" filter="url(#shadow)">
    <rect x="20" y="20" width="160" height="160" fill="url(#glassBase)" clip-path="url(#clover)"/>
    <rect x="20" y="20" width="160" height="160" fill="url(#innerGlow)" clip-path="url(#clover)"/>
    <rect x="20" y="20" width="160" height="160" fill="url(#topGloss)" clip-path="url(#clover)"/>
    <rect x="20" y="20" width="160" height="160" fill="url(#rimLight)" clip-path="url(#clover)"/>
    <rect x="20" y="20" width="160" height="160" fill="url(#bottomShadow)" clip-path="url(#clover)"/>

    <circle cx="100" cy="100" r="28" fill="url(#centerGrad)"/>
    <circle cx="100" cy="100" r="28" fill="url(#centerDepth)"/>
    <ellipse cx="95" cy="92" rx="10" ry="6" fill="white" opacity="0.45"/>
  </g>
</svg>
