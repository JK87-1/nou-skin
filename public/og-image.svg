<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Background glow -->
    <radialGradient id="og-bg-glow" cx="35%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Pearl body gradient -->
    <radialGradient id="og-pearl" cx="38%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#ede4ff"/>
      <stop offset="20%" stop-color="#d4c8f0"/>
      <stop offset="45%" stop-color="#b0a0d8"/>
      <stop offset="70%" stop-color="#6858a8"/>
      <stop offset="100%" stop-color="#483090"/>
    </radialGradient>

    <!-- Iridescence -->
    <radialGradient id="og-iri" cx="62%" cy="64%" r="38%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-iri-pink" cx="68%" cy="42%" r="30%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>

    <!-- Sheen -->
    <radialGradient id="og-sheen" cx="32%" cy="28%" r="32%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Halo glow -->
    <radialGradient id="og-halo" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="og-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#6d28d9" flood-opacity="0.3"/>
    </filter>
    <filter id="og-hlBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="og-haloBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#og-bg-glow)"/>

  <!-- Pearl group (centered at 380, 315) -->
  <g transform="translate(380, 315)">
    <!-- Halo -->
    <circle cx="0" cy="0" r="200" fill="url(#og-halo)"/>
    <circle cx="0" cy="0" r="165" fill="none" stroke="#a78bfa"
      stroke-width="8" opacity="0.04" filter="url(#og-haloBlur)"/>
    <circle cx="0" cy="0" r="165" fill="none" stroke="#a78bfa"
      stroke-width="2" opacity="0.08"/>
    <circle cx="0" cy="0" r="148" fill="none" stroke="#a78bfa"
      stroke-width="1" opacity="0.04"/>

    <!-- Pearl sphere -->
    <circle cx="0" cy="0" r="115" fill="url(#og-pearl)" filter="url(#og-shadow)"/>
    <circle cx="0" cy="0" r="115" fill="url(#og-iri)"/>
    <circle cx="0" cy="0" r="115" fill="url(#og-iri-pink)"/>
    <circle cx="0" cy="0" r="115" fill="url(#og-sheen)"/>

    <!-- Highlights -->
    <ellipse cx="-46" cy="-54" rx="19" ry="15" fill="white" opacity="0.7" filter="url(#og-hlBlur)"/>
    <circle cx="-54" cy="-66" r="7" fill="white" opacity="0.85"/>
    <circle cx="-62" cy="-74" r="3" fill="white" opacity="0.5"/>

    <!-- Edge highlight -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="white" stroke-width="1" opacity="0.05"/>
  </g>

  <!-- Text group -->
  <g transform="translate(680, 280)">
    <text x="0" y="0" fill="#f0f0f5"
      font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
      font-size="48" font-weight="700" letter-spacing="8">LUA</text>
    <text x="0" y="36" fill="#8888a0"
      font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
      font-size="14" font-weight="400" letter-spacing="3">YOUR INNER GLOW</text>
  </g>

  <!-- Subtle bottom gradient -->
  <rect y="580" width="1200" height="50" fill="url(#og-bg-glow)" opacity="0.3"/>
</svg>
